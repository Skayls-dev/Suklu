name: suklu_mobile
description: "Suklu — Tutoring platform for Francophone Africa"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ──────────────────────────────────────────────────────────────
  firebase_core:        ^3.6.0
  firebase_auth:        ^5.3.1
  cloud_firestore:      ^5.4.4
  firebase_storage:     ^12.3.2
  cloud_functions:      ^5.1.3

  # ── State management ──────────────────────────────────────────────────────
  flutter_riverpod:     ^2.5.1
  riverpod_annotation:  ^2.3.5

  # ── Navigation ────────────────────────────────────────────────────────────
  go_router:            ^14.3.0

  # ── Data models ───────────────────────────────────────────────────────────
  freezed_annotation:   ^2.4.4
  json_annotation:      ^4.9.0

  # ── HTTP ─────────────────────────────────────────────────────────────────
  dio:                  ^5.7.0

  # ── Google Sign-In ────────────────────────────────────────────────────────
  google_sign_in:       ^6.2.2

  # ── WebView (Daily.co sessions) ───────────────────────────────────────────
  webview_flutter:      ^4.10.0

  # ── URL Launcher (payment redirects) ─────────────────────────────────────
  url_launcher:         ^6.3.1

  # ── Secure storage (tokens, session keys) ─────────────────────────────────
  flutter_secure_storage: ^9.2.2

  # ── UI ────────────────────────────────────────────────────────────────────
  google_fonts:         ^6.2.1

  # ── Video sessions (Daily.co WebRTC) ──────────────────────────────────────
  # daily_flutter is the official Daily.co Flutter SDK (pub.dev)
  # Uncomment once you have a Daily.co account:
  # daily_flutter: ^0.7.0

  # ── Utils ─────────────────────────────────────────────────────────────────
  intl:                 ^0.19.0
  equatable:            ^2.0.5
  logger:               ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints:          ^4.0.0
  build_runner:           ^2.4.13
  freezed:                ^2.5.7
  riverpod_generator:     ^2.4.3
  json_serializable:      ^6.8.0
  custom_lint:            ^0.6.7
  riverpod_lint:          ^2.3.13

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: SukluSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
        - asset: assets/fonts/NotoSans-Bold.ttf
          weight: 700
