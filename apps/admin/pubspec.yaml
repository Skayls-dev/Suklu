name: suklu_admin
description: "Suklu — Super Admin Web Panel"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # Firebase
  firebase_core:    ^3.6.0
  firebase_auth:    ^5.3.1
  cloud_firestore:  ^5.4.4
  cloud_functions:  ^5.1.3

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.3.0

  # UI
  google_fonts:  ^6.2.1
  data_table_2:  ^2.5.14  # Sortable/paginated tables for admin views
  intl:          ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner:  ^2.4.13

flutter:
  uses-material-design: true
