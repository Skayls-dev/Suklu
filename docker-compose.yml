services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: suklu-qdrant
    ports:
      - "6333:6333"
    restart: unless-stopped
    volumes:
      - qdrant_storage:/qdrant/storage

  ai-gateway:
    build:
      context: ./backend/ai-gateway
    container_name: suklu-ai-gateway
    depends_on:
      - qdrant
    env_file:
      - ./backend/ai-gateway/.env
    environment:
      QDRANT_URL: http://qdrant:6333
      PORT: "8080"
      SKIP_AUTH: "true"
      DEBUG: "true"
    ports:
      - "8000:8080"
    restart: unless-stopped

volumes:
  qdrant_storage: